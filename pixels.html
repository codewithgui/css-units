<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixels Unit</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      h2 {
        font-size: 18px;
        margin-bottom: 12px;
        color: #333;
      }
      .box {
        width: 200px;
        height: 80px;
        background: #4f8ef7;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 10px;
      }
      p {
        font-size: 13px;
        color: #666;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h2>Pixels (px) — Fixed unit</h2>
    <div class="box">200px × 80px</div>
    <p>This box is always 200px wide — it never adapts to its container.</p>
    <p>Try resizing the browser window. The box stays the same size.</p>
  </body>
</html>
