<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Percent Unit</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      h2 {
        font-size: 18px;
        margin-bottom: 12px;
        color: #333;
      }
      .container {
        width: 100%;
        background: #dde;
        padding: 10px;
        border-radius: 6px;
      }
      .half {
        width: 50%;
        background: #4f8ef7;
        color: white;
        padding: 14px;
        border-radius: 4px;
        font-size: 14px;
      }
      p {
        font-size: 13px;
        color: #666;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Percentage (%) — Relative to parent</h2>
    <div class="container">
      <div class="half">50% of parent</div>
    </div>
    <p>The blue box is always 50% of its parent's width.</p>
    <p>Resize the browser window — the box adapts automatically.</p>
  </body>
</html>
